<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <title>Cadastro de Usuários</title>
    <link rel="stylesheet" href="../../css/css_components/usuario.css">

</head>


<body>

    <div id="sidebar"></div>


    <div class="container">


        <h1>Cadastro de Usuários</h1>


        <div class="form">


            <input type="text" id="nome" placeholder="Nome">
            <input type="text" id="matricula" placeholder="Matrícula">
            <input type="text" id="cargo" placeholder="Cargo">
            <input type="text" id="setor" placeholder="Setor">
            <input type="email" id="email" placeholder="Email">
            <input type="password" id="senha" placeholder="Senha">


            <select id="tipo">
                <option value="admin">Admin</option>
                <option value="operador">Operador</option>
            </select>


            <button onclick="salvarUsuario()">Salvar</button>


        </div>

        <div class="barra-pesquisa">

            <input type="text" id="pesquisaUsuario" placeholder="Pesquisar usuário..." onkeyup="pesquisarUsuario()">

            <button onclick="pesquisarUsuario()">Pesquisar</button>

            <button onclick="limparBusca()" class="btn-limpar">Limpar</button>

        </div>

        <p id="contadorUsuarios"></p>


        <h2>Usuários cadastrados</h2>


        <table>


            <thead>
                <tr>
                    <th>Nome</th>
                    <th>Matrícula</th>
                    <th>Cargo</th>
                    <th>Setor</th>
                    <th>Email</th>
                    <th>Tipo</th>
                    <th>Status</th>
                    <th>Ações</th>
                </tr>
            </thead>


            <tbody id="tabelaUsuarios"></tbody>


        </table>

        <p id="msgVazio" style="text-align:center; color:#888; display:none;">
            Nenhum usuário encontrado
        </p>


    </div>
    <script src="../../js/loadSidebar.js"></script>

    <script src="../../js/usuario.js"></script>


</body>

</html>
